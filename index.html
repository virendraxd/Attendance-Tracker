<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Attendance Tracker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
 
  <div class="header-container" style="display: flex; justify-content: center; align-items: center; position: relative;">
    <h1 style="width: 100%;">📘 Attendance Tracker <p>by virendraxd</p></h1>
    <button id="logoutBtn" onclick="logout()" style="display: none; position: absolute; right: 20px; background: #f44336; color: white;">Logout</button>
  </div>

  <!-- Login Section -->
  <div id="loginSection" class="card" style="text-align: center; padding: 40px;">
    <h2>Welcome to Attendance Tracker</h2>
    <p>Please log in to manage your attendance safely.</p>
    <button onclick="loginWithGoogle()" style="background: #4285F4; color: white; padding: 10px 20px; font-size: 16px; margin-top: 15px;">Login with Google</button>
  </div>

  <!-- Main App Section (Hidden by default) -->
  <div id="appSection" style="display: none;">
    <!-- Add Subject -->
    <div class="card">
    <div class="card-header">
        <h2>Add Subject</h2>
        <button id="toggleAddSubBtn" onclick="toggleAddSubject()">➖</button>
    </div>

    <div id="addSubjectBody">
        <input type="text" id="subjectName" placeholder="Subject Name" />
        <input type="text" id="subjectCode" placeholder="Subject Code" />
        <input type="text" id="teacherName" placeholder="Teacher Name" />

        <button onclick="addSubject()" class="present">Add Subject</button>
    </div>
    </div>

  <!-- Attendance Table -->
  <div class="card table-card">
    <h2>Your Subjects</h2>

    <table>
        <thead>
            <tr>
                <th>Subject</th>
                <!-- <th>Code</th> -->
                <th>Teacher</th>
                <th>Total</th>
                <th>Attended</th>
                <th>%</th>
                <th>Actions</th>
            </tr>
        </thead>

        <tbody id="subjectTable"></tbody>

        <tfoot>
            <tr>
                <th colspan="2">Total</th>
                <th id="totalClassesCell">0</th>
                <th id="totalAttendedCell">0</th>
                <th id="overallPercentCell">0%</th>
                <th></th>
            </tr>
        </tfoot>
    </table>
  </div>
  </div>

    <!-- Firebase SDK (Compat Version) -->
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-database-compat.js"></script>

    <script src="script.js"></script>
</body>
</html>
